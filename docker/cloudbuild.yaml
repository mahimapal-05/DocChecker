# Cloud Build pipeline: build → push → deploy to Cloud Run
# Trigger: push to main branch

steps:
  # 1. Build container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"
      - .

  # 2. Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}"

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - "2Gi"
      - --cpu
      - "2"
      - --min-instances
      - "0"
      - --max-instances
      - "10"
      - --port
      - "8000"
      - --set-env-vars
      - "OLLAMA_BASE_URL=${_OLLAMA_URL}"
      - --timeout
      - "300"

substitutions:
  _REGION: us-central1
  _REPO: doc-intel
  _SERVICE: doc-intel-api
  # Override _OLLAMA_URL with your Ollama endpoint (Cloud Run can't reach localhost)
  # e.g. a VM with Ollama exposed, or use an Ollama Cloud Run service
  _OLLAMA_URL: "http://your-ollama-host:11434"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
